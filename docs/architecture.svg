<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="kali" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="llm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="target" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="output" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700" letter-spacing="1">🛡️ ShieldCI Architecture</text>

  <!-- ═══ RUST ORCHESTRATOR BOX ═══ -->
  <rect x="50" y="65" width="800" height="205" rx="12" fill="url(#rust)" opacity="0.15" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="65" width="800" height="32" rx="12" fill="url(#rust)" opacity="0.9"/>
  <rect x="50" y="85" width="800" height="12" fill="url(#rust)" opacity="0.9"/>
  <text x="70" y="88" fill="#fff" font-size="14" font-weight="700">⚙️  RUST ORCHESTRATOR</text>
  <text x="770" y="88" fill="#ffedd5" font-size="11" text-anchor="end">src/main.rs</text>

  <!-- Steps inside orchestrator -->
  <rect x="75" y="108" width="185" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1" opacity="0.9"/>
  <text x="167" y="130" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">①  Read Config</text>
  <text x="167" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">shieldci.yml</text>

  <rect x="280" y="108" width="185" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1" opacity="0.9"/>
  <text x="372" y="130" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">②  Build &amp; Launch</text>
  <text x="372" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">Target app sandbox</text>

  <rect x="485" y="108" width="185" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1" opacity="0.9"/>
  <text x="577" y="130" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">③  Test Plan</text>
  <text x="577" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">Dynamic multi-phase</text>

  <rect x="690" y="108" width="140" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1" opacity="0.9"/>
  <text x="760" y="130" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">④  Execute</text>
  <text x="760" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">MCP tool calls</text>

  <rect x="75" y="175" width="290" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1" opacity="0.9"/>
  <text x="220" y="197" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">⑤  LLM Adaptive Strikes</text>
  <text x="220" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">AI picks follow-up attacks from results</text>

  <rect x="385" y="175" width="290" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1" opacity="0.9"/>
  <text x="530" y="197" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">⑥  Generate Report</text>
  <text x="530" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">Markdown + JSON with code fixes</text>

  <rect x="690" y="175" width="140" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1" opacity="0.9"/>
  <text x="760" y="197" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">⑦  Push</text>
  <text x="760" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">Dashboard API</text>

  <!-- ═══ ARROWS FROM ORCHESTRATOR ═══ -->
  <!-- Down-left to Kali -->
  <line x1="250" y1="270" x2="250" y2="310" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="250,318 244,306 256,306" fill="#6366f1"/>
  <text x="265" y="296" fill="#a5b4fc" font-size="9">JSON-RPC stdio</text>

  <!-- Down-right to LLM -->
  <line x1="650" y1="270" x2="650" y2="310" stroke="#10b981" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="650,318 644,306 656,306" fill="#10b981"/>
  <text x="665" y="296" fill="#6ee7b7" font-size="9">HTTP API</text>

  <!-- ═══ KALI CONTAINER BOX ═══ -->
  <rect x="50" y="320" width="400" height="185" rx="12" fill="url(#kali)" opacity="0.15" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="320" width="400" height="32" rx="12" fill="url(#kali)" opacity="0.9"/>
  <rect x="50" y="340" width="400" height="12" fill="url(#kali)" opacity="0.9"/>
  <text x="70" y="343" fill="#fff" font-size="14" font-weight="700">🐉 KALI LINUX CONTAINER</text>
  <text x="430" y="343" fill="#c7d2fe" font-size="11" text-anchor="end">kali_mcp.py</text>

  <!-- Tools inside Kali -->
  <rect x="75" y="365" width="170" height="38" rx="6" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="160" y="389" text-anchor="middle" fill="#a5b4fc" font-size="11">🗡️ sqlmap — SQLi</text>

  <rect x="255" y="365" width="170" height="38" rx="6" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="340" y="389" text-anchor="middle" fill="#a5b4fc" font-size="11">🔍 nmap — Ports</text>

  <rect x="75" y="413" width="170" height="38" rx="6" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="160" y="437" text-anchor="middle" fill="#a5b4fc" font-size="11">🕷️ nikto — Web Vulns</text>

  <rect x="255" y="413" width="170" height="38" rx="6" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="340" y="437" text-anchor="middle" fill="#a5b4fc" font-size="11">📂 gobuster — Dirs</text>

  <rect x="75" y="461" width="350" height="32" rx="6" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="250" y="482" text-anchor="middle" fill="#a5b4fc" font-size="11">🔒 check_headers — Security Headers</text>

  <!-- ═══ LLM BOX ═══ -->
  <rect x="500" y="320" width="350" height="100" rx="12" fill="url(#llm)" opacity="0.15" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <rect x="500" y="320" width="350" height="32" rx="12" fill="url(#llm)" opacity="0.9"/>
  <rect x="500" y="340" width="350" height="12" fill="url(#llm)" opacity="0.9"/>
  <text x="520" y="343" fill="#fff" font-size="14" font-weight="700">🧠 LOCAL LLM</text>
  <text x="830" y="343" fill="#a7f3d0" font-size="11" text-anchor="end">Ollama</text>

  <text x="675" y="378" text-anchor="middle" fill="#6ee7b7" font-size="12">llama3.1 via localhost:11434</text>
  <text x="675" y="398" text-anchor="middle" fill="#94a3b8" font-size="10">Adaptive attack selection + Report generation</text>

  <!-- ═══ TARGET APP BOX ═══ -->
  <rect x="500" y="440" width="168" height="65" rx="12" fill="url(#target)" opacity="0.15" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="500" y="440" width="168" height="28" rx="12" fill="url(#target)" opacity="0.9"/>
  <rect x="500" y="456" width="168" height="12" fill="url(#target)" opacity="0.9"/>
  <text x="515" y="460" fill="#fff" font-size="12" font-weight="700">🎯 TARGET APP</text>
  <text x="584" y="487" text-anchor="middle" fill="#fca5a5" font-size="10">Your app on :3000</text>

  <!-- Arrow Kali → Target -->
  <line x1="450" y1="470" x2="498" y2="470" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="498,470 488,465 488,475" fill="#ef4444"/>
  <text x="474" y="463" text-anchor="middle" fill="#fca5a5" font-size="8">attacks</text>

  <!-- ═══ OUTPUT BOX ═══ -->
  <rect x="683" y="440" width="168" height="65" rx="12" fill="url(#output)" opacity="0.15" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="683" y="440" width="168" height="28" rx="12" fill="url(#output)" opacity="0.9"/>
  <rect x="683" y="456" width="168" height="12" fill="url(#output)" opacity="0.9"/>
  <text x="698" y="460" fill="#fff" font-size="12" font-weight="700">📄 OUTPUT</text>
  <text x="767" y="487" text-anchor="middle" fill="#c4b5fd" font-size="10">Report + JSON</text>

  <!-- ═══ BOTTOM LABELS ═══ -->
  <rect x="50" y="530" width="800" height="75" rx="12" fill="#1e293b" opacity="0.5" stroke="#334155" stroke-width="1"/>

  <circle cx="90" cy="558" r="6" fill="#f97316"/>
  <text x="105" y="562" fill="#e2e8f0" font-size="11">Rust Orchestrator — drives the entire pipeline</text>

  <circle cx="90" cy="582" r="6" fill="#6366f1"/>
  <text x="105" y="586" fill="#e2e8f0" font-size="11">Kali Container — offensive security tools via MCP</text>

  <circle cx="500" cy="558" r="6" fill="#10b981"/>
  <text x="515" y="562" fill="#e2e8f0" font-size="11">Local LLM — zero data leakage</text>

  <circle cx="500" cy="582" r="6" fill="#ef4444"/>
  <text x="515" y="586" fill="#e2e8f0" font-size="11">Your code never leaves your machine</text>
</svg>
